<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Close Encounters of the Pinecone Kind</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#000014;
border:2px solid #44ff44;
margin-top:20px;
}

#message{
font-size:22px;
margin-top:10px;
}

#controls{
color:#aaa;
margin-top:5px;
}

</style>

</head>

<body>

<h1>Close Encounters of the Pinecone Kind</h1>

<p>Guide the UFO safely to the landing pad.</p>

<div id="controls">
← → Move &nbsp;&nbsp; ↑ Thrusters
</div>

<canvas id="game" width="600" height="400"></canvas>

<div id="message"></div>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
let gameOver = false;

window.addEventListener("keydown", function(e){
if(["ArrowLeft","ArrowRight","ArrowUp"].includes(e.key)){
e.preventDefault();
}
keys[e.key] = true;
});

window.addEventListener("keyup", function(e){
keys[e.key] = false;
});

let ufo = {
x:40,
y:40,
vx:0,
vy:0
};

let landingPad = {
x:250,
y:360,
width:100,
height:20
};

let stars = [];

for(let i=0;i<80;i++){
stars.push({
x:Math.random()*600,
y:Math.random()*400
});
}

let asteroids = [];

for(let i=0;i<8;i++){

asteroids.push({
x:Math.random()*600,
y:Math.random()*260+40,
size:15 + Math.random()*15,
speed:.25 + Math.random()*.35,
angle:Math.random()*Math.PI,
spin:(Math.random()-.5)*.02,
shape:generateAsteroidShape()
});

}

function generateAsteroidShape(){

let points = [];
let count = 8;

for(let i=0;i<count;i++){

let angle = (Math.PI*2/count)*i;
let radius = .7 + Math.random()*.5;

points.push({angle,radius});

}

return points;

}

function update(){

if(gameOver) return;

if(keys["ArrowLeft"]) ufo.vx -= 0.12;
if(keys["ArrowRight"]) ufo.vx += 0.12;

if(keys["ArrowUp"]){
ufo.vy -= 0.18;
}

ufo.vy += 0.05;

ufo.x += ufo.vx;
ufo.y += ufo.vy;

ufo.vx *= 0.94;

if(ufo.x < 0) ufo.x = 0;
if(ufo.x > canvas.width) ufo.x = canvas.width;

updateAsteroids();
checkAsteroidCollision();
checkLanding();

}

function updateAsteroids(){

for(let a of asteroids){

a.x += a.speed;
a.angle += a.spin;

if(a.x > canvas.width + 40){

a.x = -40;
a.y = Math.random()*260+40;

}

}

}

function checkAsteroidCollision(){

for(let a of asteroids){

let dx = ufo.x - a.x;
let dy = ufo.y - a.y;

let distance = Math.sqrt(dx*dx + dy*dy);

if(distance < a.size){
crash();
}

}

}

function checkLanding(){

if(
ufo.y + 10 >= landingPad.y &&
ufo.x >= landingPad.x &&
ufo.x <= landingPad.x + landingPad.width
){

if(Math.abs(ufo.vy) < 1.5){

success();

}else{

crash();

}

}

if(ufo.y > canvas.height){
crash();
}

}

function crash(){

gameOver = true;

document.getElementById("message").innerHTML =
"💥 CRASH!<br>Refresh to try again.";

}

function success(){

gameOver = true;

document.getElementById("message").innerHTML =
"🛸 Landing Successful!<br><br>"+
"Coordinates:<br>"+
"<b>N 42° 21.969'<br>W 71° 15.794'</b>";

}

function drawStars(){

ctx.fillStyle="white";

for(let s of stars){
ctx.fillRect(s.x,s.y,2,2);
}

}

function drawPad(){

ctx.shadowColor = "lime";
ctx.shadowBlur = 15;

ctx.fillStyle="lime";

ctx.fillRect(
landingPad.x,
landingPad.y,
landingPad.width,
landingPad.height
);

ctx.shadowBlur = 0;

ctx.fillStyle="white";
ctx.font="14px Arial";
ctx.textAlign="center";
ctx.fillText("Sachar Woods", landingPad.x + landingPad.width/2, landingPad.y - 5);

}

function drawAsteroids(){

ctx.fillStyle="#888";

for(let a of asteroids){

ctx.save();

ctx.translate(a.x,a.y);
ctx.rotate(a.angle);

ctx.beginPath();

let first = true;

for(let p of a.shape){

let px = Math.cos(p.angle) * a.size * p.radius;
let py = Math.sin(p.angle) * a.size * p.radius;

if(first){
ctx.moveTo(px,py);
first=false;
}else{
ctx.lineTo(px,py);
}

}

ctx.closePath();
ctx.fill();

ctx.restore();

}

}

function drawUFO(){

let x = ufo.x;
let y = ufo.y;

ctx.fillStyle="silver";

ctx.beginPath();
ctx.ellipse(x,y,15,6,0,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="cyan";

ctx.beginPath();
ctx.arc(x,y-5,5,0,Math.PI*2);
ctx.fill();

if(keys["ArrowUp"]){

ctx.fillStyle="orange";

ctx.beginPath();
ctx.moveTo(x-4,y+6);
ctx.lineTo(x+4,y+6);
ctx.lineTo(x,y+18);
ctx.fill();

}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawStars();
drawAsteroids();
drawPad();
drawUFO();

}

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
